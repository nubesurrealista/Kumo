---
name: Kumo update locales
on:
  workflow_dispatch: null
permissions:
  contents: write
jobs:
  locales:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - name: Generate Locales Config
        run: |
          ./gradlew :i18n:generateLocalesConfig \
            --no-build-cache \
            --no-configuration-cache \
            --no-daemon \
            --stacktrace
      - name: Check and commit changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add i18n/src/commonMain/resources/xml/locales_config.xml

          if ! git diff --staged --quiet; then
            git commit -m "auto: update locales_config.xml"
            git push
          else
            echo "No changes found in locales config"
          fi
